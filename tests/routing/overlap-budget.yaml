  min_top_to_runner_up: "0.10"

- intent: "review the architecture"
  min_top_to_runner_up: "0.10"

- intent: "deprecate the v1 API"
  min_top_to_runner_up: "0.10"

- intent: "design eval suite for LLM"
  min_top_to_runner_up: "0.10"

- intent: "review prompt injection risks"
  min_top_to_runner_up: "0.10"

- intent: "triage technical debt"
  min_top_to_runner_up: "0.10"

