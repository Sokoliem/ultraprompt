open_questions:
  product:
    - id: OP-001
      question: "Should target=all be the default release command, or should source remain the default with release docs requiring target=all?"
      recommendation: "Keep source as default for fast development; require target=all in release workflow."
    - id: OP-002
      question: "Should V8.2 block release on live activation of all new experience skills, or only release-critical skills?"
      recommendation: "Block only on release-critical skills: goal, frontend-visual-qa, pathfinding-invocation-review, and the experience-quality panel smoke."
    - id: OP-003
      question: "Should goal_contract persistence ship in V8.2 or remain documented as future work?"
      recommendation: "Ship schema and transcript bridge now; add persistence only if it stays local-only and clearable."
  technical:
    - id: OT-001
      question: "Where is the authoritative Claude Code active plugin install path on this machine?"
      recommendation: "Implement discovery as best-effort with explicit path reporting; do not fail source target if unavailable."
    - id: OT-002
      question: "What exact threshold should define meaningful live pathfinder adoption?"
      recommendation: "Start with a release-critical minimum count plus ratio warning, then tune after several fresh sessions."
    - id: OT-003
      question: "Should release-scorecard.py compute a result hash for persisted report freshness?"
      recommendation: "Yes; compare commit, target, and normalized gate result hash."
    - id: OT-004
      question: "Should panel smoke validation run a real panel lifecycle or validate fixtures only?"
      recommendation: "Start with fixtures for deterministic CI, then add optional real panel smoke for release candidates."
