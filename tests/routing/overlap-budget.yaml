# Ultraprompt V8 router overlap-budget cases
# For each intent, the top skill must beat the runner-up by at least min_top_to_runner_up.
# This catches catalog ambiguity where two skills compete on the same intent.

- intent: "review the diff before merging"
  min_top_to_runner_up: "0.10"

- intent: "investigate a flaky test"
  min_top_to_runner_up: "0.10"

- intent: "build a new feature"
  min_top_to_runner_up: "0.10"

